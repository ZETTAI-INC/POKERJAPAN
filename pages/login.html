<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1"/>
  <link rel="icon" type="image/svg+xml" href="../reference/images/favicon-poker.svg"/>
  <title>ログイン | POKER JAPAN</title>
  <meta name="description" content="POKER JAPANにログインして、ジャンケット予約やプロフィール管理をご利用ください。"/>
  <link rel="stylesheet" href="../reference/css/global-common.css"/>
  <link rel="preload" as="font" type="font/woff2" href="../reference/fonts/Inter-latin-e2cd30fdbc318a1d7777d73399f88ba1.woff2" crossorigin="anonymous"/>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg-page:#fff; --bg-alt:#f7f8fa;
      --text-1:#121214; --text-2:#595d61; --text-3:#81858c;
      --accent:#1a6b3c; --accent-light:#e8f5ee;
      --gold:#f7a600; --red:#ef454a; --green:#20b26c;
      --border:#e5e7eb; --border-light:#f0f1f3;
    }
    body { font-family:"Inter","Noto Sans JP",system-ui,-apple-system,sans-serif; background:#0b0e11; color:var(--text-1); -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    img { max-width:100%; display:block; }

    .login-page {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:24px; position:relative;
    }
    /* Subtle top-right glow — just one, not three */
    .login-page::before {
      content:''; position:fixed; top:-15%; right:-10%; width:500px; height:500px;
      background:radial-gradient(circle, rgba(26,107,60,.07) 0%, transparent 65%);
      pointer-events:none;
    }

    .login-top { margin-bottom:32px; text-align:center; }
    .login-top img { height:24px; margin:0 auto; filter:brightness(0) invert(1); opacity:.7; }

    .login-card {
      width:100%; max-width:400px; position:relative; z-index:1;
      background:#15171a; border:1px solid #23262a;
      border-radius:14px; padding:36px 32px;
    }

    .login-heading { font-size:22px; font-weight:700; color:#fff; margin-bottom:4px; }
    .login-sub { font-size:13px; color:#595d61; margin-bottom:28px; }

    .form-group { margin-bottom:18px; }
    .form-label { display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:#6b7075; letter-spacing:.3px; text-transform:uppercase; }
    .form-input {
      width:100%; padding:11px 14px; font-size:14px; font-family:inherit;
      border:1px solid #2a2d31; border-radius:8px; background:#0d1013;
      color:#fff; outline:none; transition:border-color .15s, box-shadow .15s;
    }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,107,60,.15); }
    .form-input::placeholder { color:#3d4043; }

    .input-wrap { position:relative; }
    .pass-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:none; border:none; cursor:pointer; color:#4a4d52;
      padding:4px; display:flex; transition:color .15s;
    }
    .pass-toggle:hover { color:#81858c; }

    .form-options {
      display:flex; justify-content:space-between; align-items:center;
      margin:20px 0 28px; font-size:13px;
    }
    .form-options label { display:flex; align-items:center; gap:7px; color:#6b7075; cursor:pointer; }
    .form-options label input { accent-color:var(--accent); width:14px; height:14px; }
    .form-options a { color:#6b7075; transition:color .15s; }
    .form-options a:hover { color:#adb1b8; }

    .btn-login {
      width:100%; padding:12px; font-size:14px; font-weight:600; font-family:inherit;
      background:var(--accent); color:#fff; border:none; border-radius:8px;
      cursor:pointer; transition:all .15s;
    }
    .btn-login:hover { background:#1d7a44; box-shadow:0 2px 12px rgba(26,107,60,.25); }
    .btn-login:active { transform:scale(.99); }
    .btn-login.loading { pointer-events:none; opacity:.6; }

    .login-divider {
      display:flex; align-items:center; gap:14px;
      margin:24px 0; font-size:11px; color:#3d4043; letter-spacing:.5px; text-transform:uppercase;
    }
    .login-divider::before, .login-divider::after {
      content:''; flex:1; height:1px; background:#23262a;
    }

    .social-row { display:flex; gap:10px; }
    .social-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
      padding:11px; border:1px solid #23262a; border-radius:8px;
      font-size:13px; font-weight:500; color:#8c9097; background:transparent;
      cursor:pointer; transition:all .15s; font-family:inherit;
    }
    .social-btn:hover { border-color:#3d4043; color:#d1d5db; background:rgba(255,255,255,.02); }

    .login-bottom {
      margin-top:28px; text-align:center; font-size:13px; color:#4a4d52;
    }
    .login-bottom a {
      color:var(--gold); font-weight:600; margin-left:4px;
      transition:color .15s;
    }
    .login-bottom a:hover { color:#ffc35c; }

    @media (max-width:480px) {
      .login-card { padding:28px 22px; border-radius:12px; }
      .login-heading { font-size:20px; }
      .social-row { flex-direction:column; gap:8px; }
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-top">
      <a href="../index.html"><img src="../reference/images/logo-poker.svg" alt="POKER JAPAN"/></a>
    </div>

    <div class="login-card">
      <div class="login-heading">ログイン</div>
      <div class="login-sub">アカウントにログインしてください</div>

      <form id="login-form" onsubmit="return handleLogin(event);">
        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="login-pass" placeholder="パスワードを入力" required autocomplete="current-password" style="padding-right:40px;"/>
            <button type="button" class="pass-toggle" onclick="togglePass();">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label><input type="checkbox" checked/> ログイン状態を保持</label>
          <a href="#">パスワードを忘れた方</a>
        </div>

        <button type="submit" class="btn-login" id="btn-login">ログイン</button>
      </form>

      <div class="login-divider">または</div>

      <div class="social-row">
        <button class="social-btn" type="button" onclick="handleLogin(event);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09A6.97 6.97 0 015.5 12c0-.72.13-1.43.34-2.09V7.07H2.18A11 11 0 001 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-btn" type="button" onclick="handleLogin(event);">
          <svg width="16" height="16" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C3.79 16.17 4.36 9.02 8.7 8.76c1.29.07 2.18.72 2.93.76.98-.2 1.92-.78 2.98-.71 1.26.1 2.22.58 2.84 1.5-2.6 1.55-1.98 4.97.52 5.92-.47 1.28-.94 2.54-1.92 4.05zM12.1 8.67c-.14-2.2 1.62-4.1 3.72-4.27.28 2.46-2.2 4.42-3.72 4.27z" fill="#fff"/></svg>
          Apple
        </button>
      </div>
    </div>

    <div class="login-bottom">
      アカウントをお持ちでない方は<a href="booking.html">新規登録</a>
    </div>
  </div>

  <script>
  (function() {
    if (localStorage.getItem('pj_logged_in')) { window.location.href = 'profile.html'; return; }
    window.togglePass = function() {
      var inp = document.getElementById('login-pass'), icon = document.getElementById('eye-icon');
      if (inp.type === 'password') { inp.type = 'text'; icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'; }
      else { inp.type = 'password'; icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'; }
    };
    window.handleLogin = function(e) {
      if (e) e.preventDefault();
      var email = document.getElementById('login-email').value.trim() || 'user@pokerjapan.com';
      document.getElementById('btn-login').classList.add('loading');
      setTimeout(function() {
        localStorage.setItem('pj_logged_in', 'true');
        localStorage.setItem('pj_user_email', email);
        localStorage.setItem('pj_user_name', email.split('@')[0]);
        window.location.href = 'profile.html';
      }, 400);
      return false;
    };
  })();
  </script>
</body>
</html>
