<!DOCTYPE html>
<html lang="ja" dir="ltr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1"/>
  <link rel="icon" type="image/svg+xml" href="../reference/images/favicon-poker.svg"/>
  <title>ログイン | POKER JAPAN</title>
  <meta name="description" content="POKER JAPANにログインして、ジャンケット予約やプロフィール管理をご利用ください。"/>
  <link rel="stylesheet" href="../reference/css/global-common.css"/>
  <link rel="preload" as="font" type="font/woff2" href="../reference/fonts/Inter-latin-e2cd30fdbc318a1d7777d73399f88ba1.woff2" crossorigin="anonymous"/>

  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg-page:#fff; --bg-alt:#f7f8fa;
      --text-1:#121214; --text-2:#595d61; --text-3:#81858c;
      --accent:#1a6b3c; --accent-light:#e8f5ee;
      --gold:#f7a600; --red:#ef454a; --green:#20b26c;
      --border:#e5e7eb; --border-light:#f0f1f3;
    }
    body { font-family:"Inter","Noto Sans JP",system-ui,-apple-system,sans-serif; background:var(--bg-alt); color:var(--text-1); -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    img { max-width:100%; display:block; }

    /* Header */
    .pj-header { position:sticky; top:0; z-index:1000; height:64px; background:rgba(18,18,20,.97); backdrop-filter:blur(12px); display:flex; align-items:center; }
    .pj-header-inner { max-width:1200px; width:100%; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; }
    .pj-logo img { height:30px; }
    .pj-nav { display:flex; gap:28px; }
    .pj-nav a { font-size:14px; font-weight:500; color:#adb1b8; transition:color .15s; }
    .pj-nav a:hover, .pj-nav a.active { color:#fff; }
    .pj-header-btns { display:flex; gap:10px; }
    .pj-header-btns a { font-size:14px; font-weight:600; padding:7px 18px; border-radius:8px; }
    .btn-ghost { color:#fff; }
    .btn-gold { background:var(--gold); color:#121214; }
    .pj-width { max-width:1200px; margin:0 auto; padding:0 24px; width:100%; }

    /* Login layout */
    .login-page {
      min-height:calc(100vh - 64px);
      display:flex; align-items:center; justify-content:center;
      padding:40px 24px;
    }
    .login-card {
      width:100%; max-width:420px;
      background:#fff; border-radius:16px;
      border:1px solid var(--border-light);
      padding:40px 36px;
      box-shadow:0 4px 24px rgba(0,0,0,.06);
    }
    .login-logo {
      display:flex; justify-content:center; margin-bottom:28px;
    }
    .login-logo img { height:28px; }
    .login-title {
      font-size:24px; font-weight:700; text-align:center; margin-bottom:6px;
    }
    .login-sub {
      font-size:14px; color:var(--text-3); text-align:center; margin-bottom:32px; line-height:1.5;
    }

    /* Form */
    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-2); }
    .form-input {
      width:100%; padding:12px 14px; font-size:14px; font-family:inherit;
      border:1px solid var(--border); border-radius:8px; background:#fff;
      color:var(--text-1); outline:none; transition:border-color .15s;
    }
    .form-input:focus { border-color:var(--accent); }
    .form-input::placeholder { color:var(--text-3); }

    .login-options {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:24px; font-size:13px;
    }
    .login-remember { display:flex; align-items:center; gap:6px; color:var(--text-2); }
    .login-remember input { accent-color:var(--accent); }
    .login-forgot { color:var(--accent); font-weight:500; }
    .login-forgot:hover { text-decoration:underline; }

    .btn-login {
      width:100%; padding:14px 24px; font-size:14px; font-weight:600; font-family:inherit;
      background:var(--accent); color:#fff; border:none; border-radius:8px;
      cursor:pointer; transition:background .15s;
    }
    .btn-login:hover { background:#155a32; }

    .login-divider {
      display:flex; align-items:center; gap:16px;
      margin:24px 0; font-size:13px; color:var(--text-3);
    }
    .login-divider::before, .login-divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }

    .social-login { display:flex; gap:12px; margin-bottom:24px; }
    .social-btn {
      flex:1; display:flex; align-items:center; justify-content:center; gap:8px;
      padding:12px; border:1px solid var(--border); border-radius:8px;
      font-size:13px; font-weight:500; color:var(--text-2); background:#fff;
      cursor:pointer; transition:all .15s; font-family:inherit;
    }
    .social-btn:hover { border-color:var(--text-3); background:var(--bg-alt); }
    .social-btn svg { flex-shrink:0; }

    .login-footer {
      text-align:center; font-size:13px; color:var(--text-3);
    }
    .login-footer a { color:var(--accent); font-weight:600; }
    .login-footer a:hover { text-decoration:underline; }

    .login-error {
      background:#fef2f2; border:1px solid #fecaca; border-radius:8px;
      padding:10px 14px; font-size:13px; color:var(--red);
      margin-bottom:20px; display:none;
    }

    /* Mobile hamburger */
    .pj-hamburger {
      display:none; background:none; border:none; cursor:pointer; padding:8px;
      flex-direction:column; gap:5px; z-index:1100;
    }
    .pj-hamburger span { display:block; width:22px; height:2px; background:#fff; border-radius:2px; transition:transform .2s,opacity .2s; }
    .pj-hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
    .pj-hamburger.open span:nth-child(2) { opacity:0; }
    .pj-hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }
    .pj-mobile-menu {
      display:none; position:fixed; top:64px; left:0; right:0; bottom:0;
      background:rgba(18,18,20,.98); z-index:1050; padding:24px;
      flex-direction:column; gap:0;
    }
    .pj-mobile-menu.open { display:flex; }
    .pj-mobile-menu a {
      display:block; padding:16px 0; font-size:16px; font-weight:500;
      color:#adb1b8; border-bottom:1px solid #333537; transition:color .15s;
    }
    .pj-mobile-menu a:hover { color:#fff; }
    .pj-mobile-menu .pj-mobile-btns { display:flex; gap:12px; margin-top:24px; }
    .pj-mobile-menu .pj-mobile-btns a { border:none; padding:12px 0; text-align:center; flex:1; border-radius:8px; font-weight:600; }
    .pj-mobile-menu .pj-mobile-btns .btn-ghost-m { background:#1e2023; color:#fff; }
    .pj-mobile-menu .pj-mobile-btns .btn-gold-m { background:var(--gold); color:#121214; }

    /* Responsive: Mobile */
    @media (max-width:768px) {
      .pj-nav { display:none; }
      .pj-header-btns { display:none; }
      .pj-hamburger { display:flex; }

      .login-page { padding:24px 16px; align-items:flex-start; padding-top:40px; }
      .login-card { padding:28px 20px; border-radius:12px; }
      .login-title { font-size:20px; }
      .login-sub { font-size:13px; margin-bottom:24px; }
      .social-login { flex-direction:column; gap:10px; }
      .login-options { flex-direction:column; align-items:flex-start; gap:10px; }
    }

    @media (max-width:400px) {
      .login-page { padding:16px 12px; padding-top:24px; }
      .login-card { padding:24px 16px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="pj-header">
    <div class="pj-header-inner">
      <a href="../index.html" class="pj-logo"><img src="../reference/images/logo-poker.svg" alt="POKER JAPAN" style="filter:brightness(0) invert(1);"/></a>
      <nav class="pj-nav">
        <a href="news.html">ニュース</a>
        <a href="casinos.html">海外カジノ</a>
        <a href="strategy.html">戦略ガイド</a>
        <a href="tournaments.html">トーナメント</a>
        <a href="beginners.html">初心者向け</a>
      </nav>
      <div class="pj-header-btns">
        <a href="login.html" class="btn-ghost" style="color:var(--gold);">ログイン</a>
        <a href="booking.html" class="btn-gold">無料登録</a>
      </div>
      <button class="pj-hamburger" onclick="document.querySelector('.pj-mobile-menu').classList.toggle('open');this.classList.toggle('open');" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>
  <div class="pj-mobile-menu">
    <a href="news.html">ニュース</a>
    <a href="casinos.html">海外カジノ</a>
    <a href="strategy.html">戦略ガイド</a>
    <a href="tournaments.html">トーナメント</a>
    <a href="beginners.html">初心者向け</a>
    <div class="pj-mobile-btns">
      <a href="login.html" class="btn-ghost-m">ログイン</a>
      <a href="booking.html" class="btn-gold-m">無料登録</a>
    </div>
  </div>

  <!-- LOGIN FORM -->
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="../reference/images/logo-poker.svg" alt="POKER JAPAN"/>
      </div>
      <div class="login-title">ログイン</div>
      <div class="login-sub">アカウントにログインして、ジャンケット予約や<br/>プロフィール管理をご利用ください</div>

      <div class="login-error" id="login-error">メールアドレスまたはパスワードが正しくありません</div>

      <form id="login-form" onsubmit="return handleLogin(event);">
        <div class="form-group">
          <label class="form-label">メールアドレス</label>
          <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">パスワード</label>
          <input class="form-input" type="password" id="login-pass" placeholder="パスワードを入力" required/>
        </div>

        <div class="login-options">
          <label class="login-remember">
            <input type="checkbox" checked/> ログイン状態を保持する
          </label>
          <a href="#" class="login-forgot">パスワードを忘れた方</a>
        </div>

        <button type="submit" class="btn-login">ログイン</button>
      </form>

      <div class="login-divider">または</div>

      <div class="social-login">
        <button class="social-btn" onclick="handleLogin(event);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09A6.97 6.97 0 015.5 12c0-.72.13-1.43.34-2.09V7.07H2.18A11 11 0 001 12c0 1.77.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-btn" onclick="handleLogin(event);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C3.79 16.17 4.36 9.02 8.7 8.76c1.29.07 2.18.72 2.93.76.98-.2 1.92-.78 2.98-.71 1.26.1 2.22.58 2.84 1.5-2.6 1.55-1.98 4.97.52 5.92-.47 1.28-.94 2.54-1.92 4.05zM12.1 8.67c-.14-2.2 1.62-4.1 3.72-4.27.28 2.46-2.2 4.42-3.72 4.27z"/></svg>
          Apple
        </button>
      </div>

      <div class="login-footer">
        アカウントをお持ちでない方は <a href="booking.html">無料登録</a>
      </div>
    </div>
  </div>

  <script>
  (function() {
    // Check if already logged in
    if (localStorage.getItem('pj_logged_in')) {
      window.location.href = 'profile.html';
      return;
    }

    window.handleLogin = function(e) {
      if (e) e.preventDefault();
      var email = document.getElementById('login-email').value.trim();
      var pass = document.getElementById('login-pass').value;

      // Dummy login: accept anything with an email and any password
      if (!email) {
        email = 'user@pokerjapan.com';
      }
      if (!pass && e && e.type === 'submit') {
        pass = 'demo';
      }

      // Store login state
      localStorage.setItem('pj_logged_in', 'true');
      localStorage.setItem('pj_user_email', email || 'user@pokerjapan.com');
      localStorage.setItem('pj_user_name', email ? email.split('@')[0] : 'Player');

      // Redirect to profile
      window.location.href = 'profile.html';
      return false;
    };
  })();
  </script>
</body>
</html>
